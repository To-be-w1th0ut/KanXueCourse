<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}FieldLab SQLi Range{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script defer src="{{ url_for('static', filename='js/main.js') }}"></script>
  </head>
  <body>
    <div class="noise"></div>
    <header class="topbar">
      <div class="brand-wrap">
        <a href="/" class="brand-mark">FIELDLAB</a>
        <div class="brand-copy">
          <div class="eyebrow">SQL Injection Teaching Range</div>
          <div class="muted">本地化、可重置、带修复对照的实战教学靶场</div>
        </div>
      </div>
      <nav class="top-actions">
        <a href="/labs" class="nav-pill">关卡总览</a>
        <a href="/healthz" class="nav-pill">健康检查</a>
        {% if request.endpoint and request.endpoint.startswith('api_') %}
          <a href="{{ request.path }}?mode=vuln" class="nav-pill">漏洞模式</a>
          <a href="{{ request.path }}?mode=safe" class="nav-pill">安全模式</a>
        {% else %}
          <a href="{{ request.path }}?mode=vuln" class="nav-pill {% if mode == 'vuln' %}active{% endif %}">漏洞模式</a>
          <a href="{{ request.path }}?mode=safe" class="nav-pill {% if mode == 'safe' %}active{% endif %}">安全模式</a>
        {% endif %}
      </nav>
    </header>

    <main class="page-shell">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
