services:
  web:
    build:
      context: ./app
    restart: unless-stopped
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-5000}
      APP_PUBLIC_PORT: ${APP_PUBLIC_PORT:-5060}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-change-me-for-classroom}
      DB_PATH: ${DB_PATH:-/app/data/fieldlab.db}
    ports:
      - "127.0.0.1:${HOST_WEB_PORT:-5060}:5000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=3)"]
      interval: 10s
      timeout: 3s
      retries: 10
