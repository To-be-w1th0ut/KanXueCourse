{% extends 'base.html' %}
{% block title %}{{ lab.title }}{% endblock %}
{% block content %}
{% include 'partials/lab_header.html' %}
<div class="workbench two-col">
  <section class="console-card" id="hash-render-lab" data-mode="{{ mode }}">
    <h2>Hash 驱动提示卡</h2>
    <div class="form-grid">
      <label>hash payload<input type="text" id="hash-input" placeholder="输入将写入 location.hash 的内容"></label>
      <div class="inline-button-row">
        <button class="button-primary" id="set-hash-btn" type="button">写入 hash 并渲染</button>
        <button class="button-secondary" id="render-hash-btn" type="button">仅读取当前 hash</button>
      </div>
    </div>
    <div class="preview-stage"><div id="hash-preview" class="preview-banner muted">hash 内容会渲染在这里</div></div>
    <pre class="code-panel">示例链接：{{ request.base_url }}#hello-fieldlab</pre>
  </section>
</div>
{% include 'partials/hints.html' %}
{% endblock %}
