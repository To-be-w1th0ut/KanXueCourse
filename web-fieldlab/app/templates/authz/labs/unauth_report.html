{% extends 'base.html' %}
{% block title %}{{ lab.title }}{% endblock %}
{% block content %}
{% include 'shared_lab_header.html' %}
<div class="workbench two-col wide-layout">
  <section class="console-card">
    <div class="inline-button-row wrap-row">
      <a class="button-secondary" href="/labs/authz/logout?next=/labs/authz/unauth-report&mode={{ mode }}">模拟未登录访问</a>
      <a class="button-primary" href="/labs/authz/switch/4?next=/labs/authz/unauth-report&mode={{ mode }}">切到管理员</a>
    </div>
    {% if report %}
      <div class="preview-stage"><strong>{{ report.title }}</strong><pre class="code-panel">{{ report.body }}</pre></div>
    {% endif %}
    {% if error %}<pre class="error-box">{{ error }}</pre>{% endif %}
  </section>
</div>
{% include 'shared_hints.html' %}
{% endblock %}
