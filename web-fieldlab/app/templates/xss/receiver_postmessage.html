<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body { margin: 0; padding: 16px; font-family: ui-monospace, Menlo, monospace; background: #0f1117; color: #f6ecdd; }
      #preview { min-height: 180px; border: 1px dashed rgba(255,255,255,.2); border-radius: 16px; padding: 12px; background: rgba(255,255,255,.03); }
      iframe { width: 100%; min-height: 180px; border: 1px dashed rgba(255,255,255,.2); border-radius: 16px; background: white; }
      .tiny { color: #9aa4b2; font-size: 12px; margin-bottom: 8px; }
    </style>
  </head>
  <body>
    <div class="tiny">receiver mode: {{ mode }}</div>
    {% if mode == 'vuln' %}
      <iframe id="srcdoc-frame" title="srcdoc preview"></iframe>
    {% else %}
      <pre id="preview"></pre>
    {% endif %}
    <script>
      window.addEventListener('message', function (event) {
        const data = event.data || {};
        if ({{ 'true' if mode == 'vuln' else 'false' }}) {
          document.getElementById('srcdoc-frame').srcdoc = data.card || '';
        } else {
          if (event.origin !== window.location.origin) {
            document.getElementById('preview').textContent = 'blocked: origin mismatch';
            return;
          }
          document.getElementById('preview').textContent = String(data.card || '');
        }
      });
    </script>
  </body>
</html>
