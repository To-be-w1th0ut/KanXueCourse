{% extends 'base.html' %}
{% block title %}{{ lab.title }}{% endblock %}
{% block content %}
{% include 'shared_lab_header.html' %}
<div class="workbench two-col wide-layout">
  <section class="console-card">
    <h2>前端模板（AngularJS 风格 mini 引擎）</h2>
    <div class="form-grid">
      <label>模板（用 {% raw %}{{ }}{% endraw %} 表达式）<input type="text" id="cstpl" value="{% raw %}Hello {{ student_name }} · 1+2={{ 1+2 }}{% endraw %}"></label>
      <button class="button-primary" id="cstpl-go" type="button">渲染</button>
    </div>
    <div id="cstpl-stage" class="preview-stage"><div class="preview-banner muted">渲染结果</div></div>
    <pre class="code-panel" id="cstpl-log">log:</pre>
  </section>
</div>
<script>
(function(){
  var mode = {{ mode | tojson }};
  var ctx = { student_name: 'Li Jia', course: 'WebSec', score: 94 };
  function vulnRender(tpl){
    // ❌ 用 Function 当表达式求值器（典型 client-side template injection）
    return tpl.replace(/\{\{\s*([^}]+?)\s*\}\}/g, function(_, expr){
      try { return new Function('with(this){return ('+expr+')}').call(ctx); }
      catch(e){ return '['+e.message+']'; }
    });
  }
  function safeRender(tpl){
    // ✅ 仅做变量名查表，不放表达式
    return tpl.replace(/\{\{\s*([A-Za-z_][A-Za-z0-9_]*)\s*\}\}/g, function(_, name){
      return Object.prototype.hasOwnProperty.call(ctx, name) ? String(ctx[name]) : '';
    });
  }
  document.getElementById('cstpl-go').addEventListener('click', function(){
    var tpl = document.getElementById('cstpl').value;
    var out = (mode === 'vuln') ? vulnRender(tpl) : safeRender(tpl);
    var holder = document.createElement('div'); holder.className = 'preview-banner';
    holder.textContent = out;
    document.getElementById('cstpl-stage').replaceChildren(holder);
    document.getElementById('cstpl-log').textContent = 'log: mode=' + mode + ' tpl=' + tpl;
    if (out.indexOf('49') !== -1 || out.indexOf('3') !== -1) {
      window.fieldlab && fieldlab.record('client-angular', 'CSTI evaluated arithmetic');
    }
  });
})();
</script>

{% endblock %}
