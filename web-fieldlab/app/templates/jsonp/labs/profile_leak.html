{% extends 'base.html' %}
{% block title %}{{ lab.title }}{% endblock %}
{% block content %}
{% include 'shared_lab_header.html' %}
<div class="workbench two-col wide-layout">
  <section class="console-card" id="jsonp-profile-lab">
    <h2>JSONP 资料接口</h2>
    <div class="form-grid three-col">
      <label>callback<input type="text" id="jsonp-profile-callback" value="fieldlabJsonpProfile"></label>
      <label>username
        <select id="jsonp-profile-username">{% for row in profiles %}<option value="{{ row.username }}">{{ row.username }} / {{ row.role }}</option>{% endfor %}</select>
      </label>
      <button class="button-primary" id="jsonp-profile-run" type="button">以 script 方式获取资料</button>
    </div>
    <pre class="code-panel">/api/jsonp/profile?callback=...&username=...</pre>
  </section>
</div>
<script>window.JsonpProfile = { endpoint: '/api/jsonp/profile', mode: '{{ mode }}' };</script>
{% include 'shared_hints.html' %}
{% endblock %}
